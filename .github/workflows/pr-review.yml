name: Automated PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get PR files
        id: pr-files
        run: |
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" | \
          jq -r '[.[].filename] | @json')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Basic PR Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR diff stats
          DIFF_STATS=$(gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            --jq '.additions,.deletions,.changed_files')
          
          # Post review comment
          COMMENT="## Automated PR Review Summary
          
          Changes detected:
          - Files changed: $(echo $DIFF_STATS | cut -d' ' -f3)
          - Lines added: $(echo $DIFF_STATS | cut -d' ' -f1)
          - Lines removed: $(echo $DIFF_STATS | cut -d' ' -f2)
          
          ### Review Notes
          - This is a basic automated review using GitHub's built-in functionality
          - Full Devin API integration will be added in a follow-up PR
          - Please ensure all tests pass and code follows project conventions"
          
          gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            -X POST \
            -F event=COMMENT \
            -F body="$COMMENT"
